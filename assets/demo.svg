<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" role="img" aria-label="NeuraMesh memory flow: seal, shard, scatter to peers, kill a peer, reconstruct from quorum.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#141A38"/>
    </linearGradient>
    <linearGradient id="cipher" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2A3468"/>
      <stop offset="1" stop-color="#1B2450"/>
    </linearGradient>
    <linearGradient id="reconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123B3A"/>
      <stop offset="1" stop-color="#16294F"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="dotGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6EA8FF" fill-opacity="0.8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="540" rx="16" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="538.5" rx="15.25" fill="none" stroke="#33407F" stroke-opacity="0.6" stroke-width="1.5"/>

  <!-- ===== stage connectors (drawn behind cards) ===== -->
  <g stroke="#6EA8FF" stroke-opacity="0.55" stroke-width="2" marker-end="url(#arrow)" fill="none">
    <line x1="236" y1="225" x2="266" y2="225"/>
    <line x1="424" y1="225" x2="454" y2="225"/>
  </g>

  <!-- ===== Stage 1: Memory note card ===== -->
  <g filter="url(#soft)">
    <rect x="32" y="150" width="200" height="150" rx="14" fill="#1B2450" stroke="#33407F"/>
  </g>
  <rect x="32" y="150" width="200" height="34" rx="14" fill="#232E63"/>
  <rect x="32" y="168" width="200" height="16" fill="#232E63"/>
  <text x="50" y="172" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" fill="#EAF0FF">Memory</text>
  <text x="196" y="172" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#97A3D6" text-anchor="end">note</text>
  <text x="50" y="222" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#EAF0FF">&#8220;passphrase:</text>
  <text x="50" y="244" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#EAF0FF">orange-lantern-42&#8221;</text>
  <text x="50" y="278" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#97A3D6">plaintext, on this device</text>

  <!-- ===== Stage 2: Seal ===== -->
  <text x="345" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" fill="#FFC978" text-anchor="middle">&#128274; Seal</text>
  <g filter="url(#soft)">
    <rect x="270" y="150" width="150" height="110" rx="14" fill="#1B2450" stroke="#FFC978" stroke-opacity="0.55"/>
  </g>
  <!-- lock glyph -->
  <g transform="translate(345,196)">
    <rect x="-16" y="-2" width="32" height="26" rx="6" fill="#FFC978"/>
    <path d="M-10,-2 v-8 a10,10 0 0 1 20,0 v8" fill="none" stroke="#FFC978" stroke-width="4"/>
    <circle cx="0" cy="9" r="3.4" fill="#141A38"/>
    <rect x="-1.6" y="9" width="3.2" height="7" rx="1.6" fill="#141A38"/>
  </g>
  <text x="345" y="245" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#97A3D6" text-anchor="middle">LZFSE + AES-256-GCM</text>
  <!-- ciphertext bar -->
  <text x="345" y="286" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#97A3D6" text-anchor="middle">ciphertext</text>
  <rect x="272" y="294" width="146" height="22" rx="6" fill="url(#cipher)" stroke="#33407F"/>
  <g fill="#6EA8FF" fill-opacity="0.5" font-family="ui-monospace, monospace" font-size="12">
    <text x="345" y="309" text-anchor="middle" fill="#8DA6E8" fill-opacity="0.8" letter-spacing="1.5">9f&#183;a2&#183;7c&#183;e1&#183;b4&#183;08</text>
  </g>

  <!-- ===== Stage 3: Shard ===== -->
  <text x="533" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" fill="#EAF0FF" text-anchor="middle">&#9986; Shard</text>
  <g filter="url(#soft)">
    <rect x="458" y="150" width="150" height="110" rx="14" fill="#1B2450" stroke="#33407F"/>
  </g>
  <text x="533" y="182" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" font-weight="700" fill="#3FE0C5" text-anchor="middle">2-of-3 XOR</text>
  <text x="533" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10.5" fill="#97A3D6" text-anchor="middle">erasure-coded</text>
  <!-- shard chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" text-anchor="middle">
    <rect x="470" y="218" width="40" height="28" rx="7" fill="#213066" stroke="#6EA8FF"/>
    <text x="490" y="236" fill="#6EA8FF">S0</text>
    <rect x="513" y="218" width="40" height="28" rx="7" fill="#2C2555" stroke="#B98BFF"/>
    <text x="533" y="236" fill="#B98BFF">S1</text>
    <rect x="556" y="218" width="40" height="28" rx="7" fill="#123E3C" stroke="#3FE0C5"/>
    <text x="576" y="236" fill="#3FE0C5">S2</text>
  </g>

  <!-- scatter connectors -->
  <g stroke="#33407F" stroke-opacity="0.6" stroke-width="1.6" fill="none" stroke-dasharray="4 4">
    <path d="M596,220 C660,150 660,110 700,101"/>
    <path d="M596,232 C670,232 660,187 700,187"/>
    <path d="M596,244 C660,300 660,273 700,273"/>
  </g>

  <!-- ===== Stage 4: Devices ===== -->
  <!-- peer 1 -->
  <g filter="url(#soft)">
    <rect x="712" y="64" width="456" height="74" rx="14" fill="#1B2450" stroke="#33407F"/>
  </g>
  <text x="734" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" fill="#EAF0FF">&#128187; Mac &#183; peer 1</text>
  <text x="734" y="119" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#97A3D6">holds shard S0 &#183; local</text>
  <g font-family="ui-monospace, monospace" font-size="13" font-weight="700" text-anchor="middle">
    <rect x="1092" y="87" width="48" height="30" rx="8" fill="#213066" stroke="#6EA8FF"/>
    <text x="1116" y="107" fill="#6EA8FF">S0</text>
  </g>

  <!-- peer 2 (killed) -->
  <g filter="url(#soft)">
    <rect x="712" y="150" width="456" height="74" rx="14" fill="#1B2450" stroke="#FF6FB3">
      <animate attributeName="stroke-opacity" values="0.35;0.35;1;0.55;1;0.55;0.55" keyTimes="0;0.27;0.30;0.34;0.38;0.44;1" dur="10s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="734" y="184" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" fill="#EAF0FF">&#128187; Mac &#183; peer 2</text>
  <text x="734" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#97A3D6">held shard S1</text>
  <g font-family="ui-monospace, monospace" font-size="13" font-weight="700" text-anchor="middle">
    <rect x="1092" y="173" width="48" height="30" rx="8" fill="#2C2555" stroke="#B98BFF"/>
    <text x="1116" y="193" fill="#B98BFF">S1</text>
  </g>
  <!-- kill overlay (persistent so the resolved story reads as a still frame) -->
  <g opacity="1">
    <rect x="712" y="150" width="456" height="74" rx="14" fill="#FF6FB3" fill-opacity="0.10"/>
    <g transform="translate(1035,187)">
      <circle cx="0" cy="0" r="17" fill="#2A1330" stroke="#FF6FB3" stroke-width="2.2"/>
      <path d="M-7,-7 L7,7 M7,-7 L-7,7" stroke="#FF6FB3" stroke-width="3.2" stroke-linecap="round"/>
    </g>
    <text x="1035" y="217" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#FF6FB3" text-anchor="middle">killed</text>
  </g>

  <!-- peer 3 -->
  <g filter="url(#soft)">
    <rect x="712" y="236" width="456" height="74" rx="14" fill="#1B2450" stroke="#33407F"/>
  </g>
  <text x="734" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" fill="#EAF0FF">&#128241; iPhone &#183; peer 3</text>
  <text x="734" y="291" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#97A3D6">holds shard S2 &#183; on-device store</text>
  <g font-family="ui-monospace, monospace" font-size="13" font-weight="700" text-anchor="middle">
    <rect x="1092" y="259" width="48" height="30" rx="8" fill="#123E3C" stroke="#3FE0C5"/>
    <text x="1116" y="279" fill="#3FE0C5">S2</text>
  </g>

  <!-- reconstruct connectors from peer1 + peer3 -->
  <g stroke="#3FE0C5" stroke-opacity="0.45" stroke-width="1.6" fill="none" stroke-dasharray="4 4">
    <path d="M900,117 C860,180 820,300 812,352"/>
    <path d="M900,289 C880,310 830,330 812,360"/>
  </g>

  <!-- ===== Stage 5: Reconstruct ===== -->
  <g filter="url(#soft)">
    <rect x="712" y="336" width="456" height="150" rx="14" fill="url(#reconGrad)" stroke="#3FE0C5" stroke-opacity="0.7"/>
  </g>
  <g transform="translate(738,372)">
    <rect x="-4" y="-6" width="30" height="24" rx="6" fill="#3FE0C5"/>
    <path d="M2,-6 v-7 a9,9 0 0 1 18,0" fill="none" stroke="#3FE0C5" stroke-width="4"/>
    <circle cx="11" cy="5" r="3" fill="#123B3A"/>
  </g>
  <text x="778" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="17" font-weight="700" fill="#EAF0FF">Reconstruct</text>
  <g transform="translate(918,368)" opacity="1">
    <circle cx="0" cy="6" r="12" fill="#3FE0C5"/>
    <path d="M-5,6 L-1,10 L6,1" fill="none" stroke="#0B1020" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="738" y="418" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12.5" fill="#97A3D6">recovered from quorum {S0, S2} &#183; S1 not needed</text>
  <rect x="738" y="430" width="404" height="34" rx="9" fill="#0F2E2C" stroke="#3FE0C5" stroke-opacity="0.55"/>
  <text x="754" y="452" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#3FE0C5" opacity="1">
    &#8220;passphrase: orange-lantern-42&#8221; &#10003;</text>

  <!-- ===== animated couriers ===== -->
  <!-- scatter: S0 -> peer1 -->
  <g opacity="0" filter="url(#dotGlow)">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.08;0.095;0.16;0.185;1" dur="10s" repeatCount="indefinite"/>
    <circle r="5" fill="#6EA8FF"/>
    <animateMotion path="M596,220 C660,150 660,110 700,101" dur="10s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.09;0.16;1" calcMode="spline" keySplines="0 0 1 1;0.3 0 0.2 1;0 0 1 1"/>
  </g>
  <!-- scatter: S1 -> peer2 -->
  <g opacity="0" filter="url(#dotGlow)">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.12;0.135;0.20;0.225;1" dur="10s" repeatCount="indefinite"/>
    <circle r="5" fill="#B98BFF"/>
    <animateMotion path="M596,232 C670,232 660,187 700,187" dur="10s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.13;0.20;1" calcMode="spline" keySplines="0 0 1 1;0.3 0 0.2 1;0 0 1 1"/>
  </g>
  <!-- scatter: S2 -> peer3 -->
  <g opacity="0" filter="url(#dotGlow)">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.16;0.175;0.24;0.265;1" dur="10s" repeatCount="indefinite"/>
    <circle r="5" fill="#3FE0C5"/>
    <animateMotion path="M596,244 C660,300 660,273 700,273" dur="10s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.17;0.24;1" calcMode="spline" keySplines="0 0 1 1;0.3 0 0.2 1;0 0 1 1"/>
  </g>
  <!-- reconstruct: peer1 S0 -> node -->
  <g opacity="0" filter="url(#dotGlow)">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.40;0.415;0.50;0.525;1" dur="10s" repeatCount="indefinite"/>
    <circle r="5" fill="#6EA8FF"/>
    <animateMotion path="M900,117 C860,180 820,300 812,352" dur="10s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.41;0.50;1" calcMode="spline" keySplines="0 0 1 1;0.3 0 0.2 1;0 0 1 1"/>
  </g>
  <!-- reconstruct: peer3 S2 -> node -->
  <g opacity="0" filter="url(#dotGlow)">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.44;0.455;0.54;0.565;1" dur="10s" repeatCount="indefinite"/>
    <circle r="5" fill="#3FE0C5"/>
    <animateMotion path="M900,289 C880,310 830,330 812,360" dur="10s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.45;0.54;1" calcMode="spline" keySplines="0 0 1 1;0.3 0 0.2 1;0 0 1 1"/>
  </g>

  <!-- caption -->
  <text x="600" y="522" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13.5" fill="#97A3D6" text-anchor="middle">No single peer holds a full copy &#183; any one device can die &#183; a K-of-2 quorum still reconstructs.</text>
</svg>
